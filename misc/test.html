  .dice-outer {
    display: inline-block;
    position: relative;
    width: 60px;
    height: 60px;
    perspective: 10000px;
    margin-left: 100px;
    margin-top: 100px;
    margin-right: 64px;
    margin-bottom: 32px;
    box-sizing: border-box;

    transform-style: preserve-3d;
    animation-fill-mode: forwards;

    animation: dice-movement 1.5s linear both;
  }

  .dice {
    display: inline-block;
    position: absolute;

    width: 60px;
    height: 60px;

    transform-style: preserve-3d;
    transform-origin: center center;
  }

  .dice-face {
    position: absolute;
    background: white;

    transform-origin: center center;
    backface-visibility: hidden;

    display: grid;
    grid-template-areas:
      'a . c'
      'e g f'
      'd . b';

    flex: 0 0 auto;
    padding: 10px;
    width: 60px;
    height: 60px;
    border: 2px solid #aaa;
    box-sizing: border-box;

    background-color: #e7e7e7;
    box-shadow: 0px 0px 10px 1px rgb(255, 230, 0);
    /* box-shadow:
      inset 0 5px white,
      inset 0 -5px #bbb,
      inset 5px 0 #d7d7d7,
      inset -5px 0 #d7d7d7; */
    border-radius: 15%;
  }

  .dice-face.back {
    background: #aaa;
  }

  .pip {
    display: block;
    align-self: center;
    justify-self: center;
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background-color: #333;
    box-shadow:
      inset 0 3px #111,
      inset 0 -3px #555;
  }

  .pip:nth-child(2) {
    grid-area: b;
  }
  .pip:nth-child(3) {
    grid-area: c;
  }
  .pip:nth-child(4) {
    grid-area: d;
  }
  .pip:nth-child(5) {
    grid-area: e;
  }
  .pip:nth-child(6) {
    grid-area: f;
  }
  /* This selects the last pip of odd-valued dice (1, 3, 5) and positions the pip in the center */
  .pip:nth-child(odd):last-child {
    grid-area: g;
  }

  .dice-face:nth-child(1) {
    transform: translateZ(30px);
  }
  .dice-face:nth-child(2) {
    transform: rotateY(-90deg) translateZ(30px);
  }
  .dice-face:nth-child(3) {
    transform: rotateX(-90deg) translateZ(30px);
  }
  .dice-face:nth-child(4) {
    transform: rotateX(90deg) translateZ(30px);
  }
  .dice-face:nth-child(5) {
    transform: rotateY(90deg) translateZ(30px);
  }
  .dice-face:nth-child(6) {
    transform: rotateY(180deg) translateZ(30px);
  }

  .dice-face:nth-child(7) {
    transform: translateZ(30px) rotateY(180deg);
  }
  .dice-face:nth-child(8) {
    transform: rotateY(-90deg) translateZ(30px) rotateY(180deg);
  }
  .dice-face:nth-child(9) {
    transform: rotateX(-90deg) translateZ(30px) rotateY(180deg);
  }
  .dice-face:nth-child(10) {
    transform: rotateX(90deg) translateZ(30px) rotateY(180deg);
  }
  .dice-face:nth-child(11) {
    transform: rotateY(90deg) translateZ(30px) rotateY(180deg);
  }
  .dice-face:nth-child(12) {
    transform: rotateY(180deg) translateZ(30px) rotateY(180deg);
  }

<script type="text/javascript">
  const Errors = {
    MISSING_ELEMENT: 'HTMLElement to render dice animation not specified.',
    INVALID_ELEMENT: '"element" must be a HTMLElement.',
    MISSING_NUMBER_OF_DICE: 'Number of dice to use not specified.',
    NUMBER_OF_DICE_NUMBER: '"numberOfDice" must be a number.',
    NUMBER_OF_DICE_INTEGER: '"numberOfDice" must be an integer.',
    MISSING_CALLBACK: 'Provide a callback function to recieve dice values.',
    INVALID_CALLBACK: '"callback" must be a function.',
    INVALID_DELAY_TYPE: 'Time is seconds. "delay" must be a number.',
    INVALID_VALUES: 'Values to generate. "values" must be an array of numbers.',
    INVALID_VALUES_LENGTH: 'The length of "values" must be equal to the numberOfDice.',
    INVALID_SOUND_VOLUME: 'Sound volume must be a number between 0 - 1',
    INVALID_VALUE_NUMBER: (value) => `${value} in "values" must be a number.`,
    INVALID_VALUE_INTEGER: (value) => `${value} in "values" must be an integer.`,
  };

  const dieInDOM = [];
  function verifyParams(options) {
    const { numberOfDice, callback, element, delay, values, soundVolume } = options;
    if (!element) throw new Error(Errors.MISSING_ELEMENT);
    if (!(element instanceof HTMLElement)) throw new Error(Errors.INVALID_ELEMENT);

    if (!numberOfDice) throw new Error(Errors.MISSING_NUMBER_OF_DICE);
    if (typeof numberOfDice !== 'number') throw new Error(Errors.NUMBER_OF_DICE_NUMBER);

    if (!Number.isInteger(numberOfDice)) throw new Error(Errors.NUMBER_OF_DICE_INTEGER);

    if (!callback) throw new Error(Errors.MISSING_CALLBACK);
    if (typeof callback !== 'function') throw new Error(Errors.INVALID_CALLBACK);

    if (delay && typeof delay !== 'number') throw new Error(Errors.INVALID_DELAY_TYPE);

    if (values) {
      if (!Array.isArray(values)) throw new Error(Errors.INVALID_VALUES);
      if (values.length !== numberOfDice) throw new Error(Errors.INVALID_VALUES_LENGTH);
      values.forEach((value) => {
        if (typeof value !== 'number') throw new Error(Errors.INVALID_VALUE_NUMBER(value));
        if (!Number.isInteger(value)) throw new Error(Errors.INVALID_VALUE_INTEGER(value));
      });
    }

    if (typeof soundVolume !== 'number') throw new Error(Errors.INVALID_SOUND_VOLUME);
    if (soundVolume < 0 || soundVolume > 1) throw new Error(Errors.INVALID_SOUND_VOLUME);
  }

  function getFace(pips) {
    const elt = document.createElement('div');
    elt.className = 'dice-face';
    if (pips == 0) elt.className = 'dice-face back';

    for (let i = 0; i < pips; i++) {
      const pip = document.createElement('div');
      pip.className = 'pip';
      elt.appendChild(pip);
    }

    return elt;
  }

  function appendDieContainers(dieId, element, angle) {
    const outer = document.createElement('div');
    outer.className = 'dice-outer';
    outer.id = dieId;
    element.appendChild(outer);

    const dice = document.createElement('div');
    dice.className = 'dice';
    dice.style.transform = `rotateX(${angle[0]}deg) rotateY(${angle[1]}deg)`;
    outer.appendChild(dice);
    return dice;
  }

  function removeDieFromDOM(dieId) {
    const removeElement = document.getElementById(dieId);
    if (removeElement) {
      removeElement.remove();
    }
  }

  const rollADie = function (options) {
    const { numberOfDice, callback, element, values, soundVolume = 1 } = options;
    let delay = options.delay || 3000;
    if (dieInDOM.length) {
      dieInDOM.forEach((die) => removeDieFromDOM(die));
      dieInDOM.length = 0; //reset the array
    }
    verifyParams({ ...options, soundVolume });
    const result = [];

    for (let i = 0; i < numberOfDice; i++) {
      const dieFace = values ? values[i] : Math.floor(Math.random() * 6) + 1;
      result.push(dieFace);
      const angle = {
        1: [0, 0],
        2: [0, 90],
        3: [90, 0],
        4: [-90, 0],
        5: [0, -90],
        6: [180, 0],
      }[dieFace];
      const dieId = 'die';
      dieInDOM.push(dieId);
      const dice = appendDieContainers(dieId, element, angle);
      [1, 2, 3, 4, 5, 6].map(getFace).forEach((face) => dice.appendChild(face));
      [0, 0, 0, 0, 0, 0].map(getFace).forEach((face) => dice.appendChild(face));

      //      setTimeout(() => removeDieFromDOM(dieId), delay);

      if (result.length === numberOfDice && callback) {
        callback(result);
      }
    }
  };

  rollADie({ element: document.getElementById('container'), numberOfDice: 1, values: [6], callback: (elt) => console.log(elt) });
  //  rotateY(60deg) rotateX(3deg) rotateZ(7deg)

  let speedX = 4;
  let x = 0;
  let y = 0;
  let vy = 0;
  let ay = 2;
  let bottom = 300;
  let zangle = -150;
  let yangle = 100;
  let frames = [];

  document.getElementById('container').addEventListener('click', () => {
    document.getElementById('textarea').innerHTML = '';
    for (let i = 0; i < 90; i++) {
      let coeff = Math.exp(-i / 50);

      frames.push({
        transform: `rotateX(${parseInt(-55 * coeff)}deg) rotateZ(${parseInt(zangle)}deg) rotateY(${parseInt(yangle)}deg)`,
        left: `${parseInt(x)}px`,
        top: `${parseInt(y)}px`,
      });

      zangle += 20 * coeff;
      yangle -= 10 * coeff;
      x += speedX;
      vy += ay;
      if (y + vy > bottom) {
        y = bottom - (y + vy - bottom);
        vy = -0.8 * vy;
      } else {
        y += vy;
      }
      //    if (i > 90) speedX = 2;
      //    if (i > 90) y = bottom;
    }
    y = parseInt(y);
    x = parseInt(x);

    // rotateX(-9.275098099772752deg) rotateZ(689.703183135731deg) rotateY(-319.85159156786546deg)
    frames.push({
      transform: 'rotateX(-9deg) rotateZ(695deg) rotateY(-320deg)',
      left: `${x}px`,
      top: `${y + 14}px`,
    });
    x += speedX;
    frames.push({
      transform: 'rotateX(-7deg) rotateZ(700deg) rotateY(-320deg)',
      left: `${x}px`,
      top: `${y + 14}px`,
    });
    x += speedX;
    frames.push({
      transform: 'rotateX(-5deg) rotateZ(704deg) rotateY(-320deg)',
      left: `${x}px`,
      top: `${y + 14}px`,
    });
    x += speedX;
    frames.push({
      transform: 'rotateX(-3deg) rotateZ(708deg) rotateY(-325deg)',
      left: `${x}px`,
      top: `${y + 15}px`,
    });
    x += speedX;
    frames.push({
      transform: 'rotateX(-2deg) rotateZ(710deg) rotateY(-325deg)',
      left: `${x}px`,
      top: `${y + 20}px`,
    });
    x += speedX;
    frames.push({
      transform: 'rotateX(-2deg) rotateZ(710deg) rotateY(-345deg)',
      left: `${x}px`,
      top: `${y + 27}px`,
    });
    x += speedX;
    frames.push({
      transform: 'rotateX(-1deg) rotateZ(710deg) rotateY(-349deg)',
      left: `${x}px`,
      top: `${y + 35}px`,
    });
    x += speedX;
    frames.push({
      transform: 'rotateX(0deg) rotateZ(710deg) rotateY(-354deg)',
      left: `${x}px`,
      top: `${y + 42}px`,
    });
    x += speedX;
    frames.push({
      transform: 'rotateX(0deg) rotateZ(710deg) rotateY(-357deg)',
      left: `${x}px`,
      top: `${y + 50}px`,
    });
    x += speedX;
    frames.push({
      transform: 'rotateX(0deg) rotateZ(720deg) rotateY(-360deg)',
      left: `${x}px`,
      top: `${y + 57}px`,
    });
    x += speedX;
    frames.push({
      transform: 'rotateX(0deg) rotateZ(720deg) rotateY(-360deg)',
      left: `${x}px`,
      top: `${y + 60}px`,
    });

    let frames2 = frames.map((frame) => {
      return {
        transform: `translateX(${frame.left}) translateY(${frame.top}) ` + frame.transform,
      };
    });

    let o = document.getElementById('textarea');
    o.innerHTML = '';
    frames2.forEach((frame, i) => {
      o.innerHTML += `
      ${i}% {
        transform: ${frame.transform};
      }
      `;
    });

    const timing = {
      duration: 1500,
      iterations: 1,
      fill: 'forwards',
    };

    document.getElementById('die').animate(frames2, timing);
  });
</script>
